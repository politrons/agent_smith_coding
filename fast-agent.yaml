default_model: "generic.qwen3.5:latest"
llm_retries: 0

logger:
  transports: [console]
  level: info
  progress_display: true

usage_telemetry:
  enabled: false

generic:
  api_key: "ollama"
  base_url: "${OLLAMA_BASE_URL:http://localhost:11434/v1}"

mcp:
  servers:
    filesystem:
      transport: "stdio"
      command: "${AGENT_SMITH_PYTHON:python3}"
      args:
        - "-m"
        - "open_agent_coding.filesystem_mcp"
      env:
        PYTHONPATH: "${PYTHONPATH:src}"
        MCP_FILESYSTEM_ROOT: "${MCP_FILESYSTEM_ROOT:.}"
      read_timeout_seconds: 60

    sequential_thinking:
      transport: "stdio"
      command: "${AGENT_SMITH_PYTHON:python3}"
      args:
        - "-m"
        - "open_agent_coding.sequential_thinking_mcp"
      env:
        PYTHONPATH: "${PYTHONPATH:src}"
      read_timeout_seconds: 60

    memory:
      transport: "stdio"
      command: "${AGENT_SMITH_PYTHON:python3}"
      args:
        - "-m"
        - "open_agent_coding.memory_mcp"
      env:
        PYTHONPATH: "${PYTHONPATH:src}"
        MEMORY_FILE_PATH: "${MCP_MEMORY_FILE_PATH:data/default-memory.jsonl}"
      read_timeout_seconds: 45

    browser:
      transport: "stdio"
      command: "${AGENT_SMITH_PYTHON:python3}"
      args:
        - "-m"
        - "open_agent_coding.browser_mcp"
      env:
        PYTHONPATH: "${PYTHONPATH:src}"
      read_timeout_seconds: 60

    terminal:
      transport: "stdio"
      command: "${AGENT_SMITH_PYTHON:python3}"
      args:
        - "-m"
        - "open_agent_coding.terminal_mcp"
      env:
        PYTHONPATH: "${PYTHONPATH:src}"
        MCP_TERMINAL_ROOT: "${MCP_FILESYSTEM_ROOT:.}"
        MCP_TERMINAL_TIMEOUT_SECONDS: "${MCP_TERMINAL_TIMEOUT_SECONDS:120}"
        AGENT_SMITH_TERMINAL_LOG: "${AGENT_SMITH_TERMINAL_LOG:data/terminal-events.jsonl}"
      read_timeout_seconds: 300
